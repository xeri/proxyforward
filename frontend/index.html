<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>proxyforward</title>
    <!-- First-frame background before the stylesheet lands; matches tokens. -->
    <style>
        html { background: #0b0d13; }
        html[data-theme="light"] { background: #eceef6; }
    </style>
</head>
<body>
<!-- Refraction filter for data-fx="high" glass (glass.css); inert otherwise. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="pf-refract">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="1"/>
        <feDisplacementMap in="SourceGraphic" scale="12"/>
    </filter>
</svg>
<div id="root"></div>
<script src="./src/main.tsx" type="module"></script>
</body>
</html>
